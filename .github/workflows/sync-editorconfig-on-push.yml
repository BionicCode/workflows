name: Sync .editorconfig from canonical (PR-only)

on:
  
  workflow_call:
    inputs:
      canonical_raw_url:
        required: true
        type: string
      sync_branch_prefix:
        required: false
        type: string
        default: "chore/sync-editorconfig"
  
permissions:
  contents: write
  pull-requests: write

env:
  # Your canonical raw URL (as provided)
  CANONICAL_RAW_URL: https://raw.githubusercontent.com/BionicCode/bioniccode-code-style/refs/heads/main/BionicCode.CodeStyle/BionicCode.CodeStyle/.editorconfig
  SYNC_BRANCH_PREFIX: chore/sync-editorconfig

# Avoid cross-branch cancellations; scope concurrency per PR number or per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 1) PR guard: fail early if the PR branch is out of sync with canonical.
  verify-on-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Download canonical .editorconfig
        run: |
          set -euo pipefail
          curl -fsSL "${CANONICAL_RAW_URL}" -o canonical.editorconfig

      - name: Ensure exactly one tracked .editorconfig (repo root)
        run: |
          set -euo pipefail
          count="$(git ls-files '**/.editorconfig' | wc -l | tr -d ' ')"
          if [ "${count}" -ne 1 ]; then
            echo "::error::Expected exactly one tracked .editorconfig (repo root). Found: ${count}"
            git ls-files '**/.editorconfig' || true
            exit 1
          fi

      - name: Fail if .editorconfig is out of sync
        run: |
          set -euo pipefail
          if cmp -s .editorconfig canonical.editorconfig; then
            echo ".editorconfig is in sync with canonical."
          else
            echo "::error::.editorconfig is OUT OF SYNC with canonical. Merge the sync PR created by this workflow."
            exit 1
          fi

  # 2) PR creator/updater: on push/workflow_dispatch, create or update a sync PR into the *current branch*.
  open-or-update-sync-pr:
    if: >
      github.event_name != 'pull_request' &&
      startsWith(github.ref, 'refs/heads/') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Determine base branch
        id: base
        shell: bash
        run: |
          set -euo pipefail
          # For push & workflow_dispatch on a branch, github.ref_name is the branch name.
          echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.base.outputs.name }}
          fetch-depth: 0

      - name: Download canonical .editorconfig
        run: |
          set -euo pipefail
          curl -fsSL "${CANONICAL_RAW_URL}" -o canonical.editorconfig

      - name: Apply canonical .editorconfig if changed
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [ -f .editorconfig ] && cmp -s .editorconfig canonical.editorconfig; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mv canonical.editorconfig .editorconfig
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Compute sync branch name (per base branch)
        if: steps.diff.outputs.changed == 'true'
        id: syncbranch
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.name }}"
          safe="$(echo "$base" | tr '/ ' '--')"
          echo "name=${SYNC_BRANCH_PREFIX}/${safe}" >> "$GITHUB_OUTPUT"

      - name: Create or update PR into the base branch
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.syncbranch.outputs.name }}
          base: ${{ steps.base.outputs.name }}
          title: "chore: sync .editorconfig from canonical"
          commit-message: "chore(sync): update .editorconfig from canonical"
          body: |
            Automated sync of `.editorconfig` from the canonical repository.

            Source: BionicCode/bioniccode-code-style (main)
          add-paths: |
            .editorconfig
          labels: automation

      - name: Report PR result
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "PR number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR URL:    ${{ steps.cpr.outputs.pull-request-url }}"
